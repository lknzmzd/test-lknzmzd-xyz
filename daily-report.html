<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Report</title>
  <link rel="stylesheet" href="./styles.css?v=10" />
</head>
<body>
  <main class="daily-report-page">
    <section class="daily-report-card">
      <h1>Daily Report</h1>
      <p id="reportDate"></p>

      <div id="dailyReportContainer" class="daily-report-output"></div>

      <div class="report-actions">
        <button id="copyDailyReportBtn" type="button">Copy Daily Report</button>
        <button id="saveReportBtn" type="button">Refresh Report</button>
        <button id="resetReportBtn" type="button">Reset Report</button>
      </div>

      <p id="reportStatus">No updates yet.</p>

      <hr style="margin:20px 0; opacity:.2;" />

      <section>
        <h2 style="margin-bottom:10px;">Activity Summary</h2>
        <p><strong>Last added by:</strong> <span id="lastAddedBy">—</span></p>
        <p><strong>Last added at:</strong> <span id="lastAddedAt">—</span></p>
        <p><strong>Last reset by:</strong> <span id="lastResetBy">—</span></p>
        <p><strong>Last reset at:</strong> <span id="lastResetAt">—</span></p>
        <p><strong>Last reset IP:</strong> <span id="lastResetIp">—</span></p>
      </section>

      <hr style="margin:20px 0; opacity:.2;" />

      <section>
        <h2 style="margin-bottom:10px;">Add History</h2>
        <div id="addHistoryList">No add history yet.</div>
      </section>

      <hr style="margin:20px 0; opacity:.2;" />

      <section>
        <h2 style="margin-bottom:10px;">Reset History</h2>
        <div id="resetHistoryList">No reset history yet.</div>
      </section>
    </section>

    <div id="resetModal" class="hidden">
      <div class="modal-box">
        <h2>Leader Confirmation Required</h2>
        <input id="resetUsernameInput" type="text" placeholder="Leader username" autocomplete="username" />
        <input id="resetPasswordInput" type="password" placeholder="Password" autocomplete="current-password" />
        <div class="report-actions">
          <button id="confirmResetBtn" type="button">Confirm Reset</button>
          <button id="cancelResetBtn" type="button">Cancel</button>
        </div>
        <p id="resetMessage"></p>
      </div>
    </div>
  </main>

  <script type="module" src="./daily-report.js?v=10"></script>
</body>
</html>
